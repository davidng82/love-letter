:root{
  --ink:#2b1420;
  --wine:#7a2036;
  --wine-deep:#4d1424;
  --gold:#c9a15a;
  --gold-bright:#e6c07d;
  --coral:#e2765a;
  --parchment:#faf3ea;
  --blush:#f3ded2;
  --vh100: 100vh;
}
@supports (height: 100dvh){
  :root{ --vh100: 100dvh; }
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  min-height:var(--vh100);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 16px;
  background:
    radial-gradient(120% 90% at 50% 0%, #3a1420 0%, #200c14 55%, #150910 100%);
  color:var(--parchment);
  font-family:'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  overflow-x:hidden;
}

#petals{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.stage{
  position:relative;
  z-index:1;
  width:min(400px, 100%, calc((var(--vh100) - 64px) * 0.523));
  aspect-ratio:9/17.2;
  border-radius:28px;
  overflow:hidden;
  box-shadow:
    0 30px 60px -20px rgba(0,0,0,.65),
    0 0 0 1px rgba(201,161,90,.25),
    inset 0 0 60px rgba(0,0,0,.25);
  background:var(--ink);
}

.scene{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  opacity:0;
  visibility:hidden;
  transform:scale(.98);
  transition:opacity .5s ease, transform .5s ease, visibility 0s linear .5s;
}
.scene.active{
  opacity:1;
  visibility:visible;
  transform:scale(1);
  transition:opacity .5s ease .05s, transform .5s ease .05s;
}

.icon-btn{
  position:absolute;
  top:16px;
  width:38px;
  height:38px;
  border-radius:50%;
  border:1px solid rgba(250,243,234,.35);
  background:rgba(43,20,32,.45);
  backdrop-filter:blur(6px);
  color:var(--parchment);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  touch-action:manipulation;
  z-index:5;
  transition:background .2s ease, transform .2s ease;
}
.icon-btn:hover{background:rgba(43,20,32,.7);}
.icon-btn:active{transform:scale(.92);}
.icon-btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.close-btn{
  right:16px;
  background:var(--wine);
  border-color:rgba(250,243,234,.5);
}
.close-btn:hover{background:var(--wine-deep);}

.quote-line{
  font-style:italic;
  font-weight:400;
  color:var(--blush);
  opacity:.72;
  font-size:.95rem;
  line-height:1.5;
  text-wrap:balance;
}

/* ================= SCENE 1 — ENVELOPE ================= */
#scene-envelope{
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(80% 60% at 50% 38%, rgba(201,161,90,.28), transparent 65%),
    linear-gradient(180deg, #2c1119 0%, #1c0c13 60%, #140810 100%);
  padding:24px;
  gap:22px;
  text-align:center;
}
.envelope-quote{padding:0 18px;}

.envelope-wrap{
  position:relative;
  display:block;
  width:78%;
  max-width:230px;
  margin:0;
  padding:0;
  border:none;
  background:none;
  font:inherit;
  -webkit-appearance:none;
  appearance:none;
  cursor:pointer;
  touch-action:manipulation;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.55));
}
.envelope-wrap:focus-visible{outline:2px solid var(--gold); outline-offset:6px; border-radius:8px;}

.envelope-body{
  position:relative;
  width:100%;
  padding-top:64%;
  background:linear-gradient(155deg, var(--blush), var(--parchment) 55%, #eddbc9 100%);
  border-radius:6px;
}
.envelope-flap{
  position:absolute;
  top:0; left:0; right:0;
  height:56%;
  background:linear-gradient(155deg, #eaceb9, var(--blush));
  clip-path:polygon(0 0, 100% 0, 50% 92%);
  transform-origin:top center;
  transition:transform .7s cubic-bezier(.6,-0.2,.35,1.3);
  border-radius:6px 6px 0 0;
}
.envelope-shadow-fold{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, transparent 45%, rgba(122,32,54,.08) 100%);
  clip-path:polygon(0 100%, 50% 40%, 100% 100%);
}
.seal{
  position:absolute;
  left:50%; top:26%;
  width:52px; height:52px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #dcb15f, var(--gold) 60%, #9c7638 100%);
  box-shadow:0 4px 10px rgba(0,0,0,.45), inset 0 -3px 6px rgba(0,0,0,.35), inset 0 2px 4px rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  z-index:3;
  transition:transform .4s ease, opacity .4s ease;
}
.seal svg{width:22px;height:22px;fill:var(--ink);}

.letter-peek{
  position:absolute;
  left:8%; right:8%;
  bottom:6%;
  height:70%;
  background:var(--parchment);
  border-radius:4px 4px 0 0;
  box-shadow:0 -2px 10px rgba(0,0,0,.15);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:14%;
  transform:translateY(6%);
  transition:transform .6s ease .15s;
  z-index:1;
}
.letter-peek span{
  font-family:'Caveat',cursive;
  font-weight:600;
  color:var(--wine);
  font-size:1.15rem;
  letter-spacing:.02em;
  text-align:center;
  padding:0 10%;
}

.envelope-wrap.open .envelope-flap{transform:rotateX(160deg);}
.envelope-wrap.open .seal{opacity:0; transform:translate(-50%,-50%) scale(.6);}
.envelope-wrap.open .letter-peek{transform:translateY(-38%);}

.tap-hint{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:.68rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--blush);
  opacity:.8;
  animation:pulse-hint 2.4s ease-in-out infinite;
}
@keyframes pulse-hint{0%,100%{opacity:.5;}50%{opacity:1;}}

/* ================= SCENE 2 — LETTER ================= */
#scene-letter{
  display:block;
  background:linear-gradient(180deg, var(--parchment), #f1e4d4 100%);
  color:var(--ink);
  padding:56px 26px 22px;
  overflow-y:auto;
  scroll-behavior:smooth;
}
.letter-heading{
  font-style:italic;
  font-weight:600;
  font-size:1.7rem;
  color:var(--wine);
  margin:6px 0 14px;
  text-wrap:balance;
}
.letter-cake-strip{
  margin:0 0 14px;
  width:100%;
  height:64px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 8px 18px -8px rgba(122,32,54,.35);
}
.letter-cake-strip svg{width:100%;height:100%;display:block;}

.letter-body{
  font-size:1.05rem;
  line-height:1.75;
  color:#3a2129;
  min-height:1.75em;
  white-space:pre-line;
}
.letter-body .cursor{
  display:inline-block;
  width:2px;
  height:1em;
  background:var(--wine);
  margin-left:2px;
  vertical-align:-.15em;
  animation:blink 1s step-end infinite;
}
@keyframes blink{50%{opacity:0;}}

.letter-quote{
  margin-top:18px;
  color:var(--wine);
  opacity:.7;
}

.letter-photo{
  margin:2px 0 18px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 14px 30px -14px rgba(122,32,54,.45);
  opacity:0;
  transform:translateY(10px) scale(.98);
  transition:opacity .7s ease, transform .7s ease;
}
.letter-photo.show{opacity:1; transform:none;}
.letter-photo img{width:100%; height:auto; max-height:320px; object-fit:cover; display:block;}

#scene-letter::-webkit-scrollbar{width:0;height:0;}

@media (prefers-reduced-motion: reduce){
  .tap-hint{animation:none !important;}
  .scene,.envelope-flap,.seal,.letter-peek,.letter-photo{transition:none !important;}
}
</style>

    <p class="quote-line letter-quote">— Thu Hà より —</p>

</main>

<script>
(function(){
  "use strict";
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- scene management ---------- */
  var scenes = {
    envelope: document.getElementById('scene-envelope'),
    letter: document.getElementById('scene-letter')
  };
  function showScene(name){
    Object.keys(scenes).forEach(function(k){
      scenes[k].classList.toggle('active', k === name);
    });
  }

  /* ---------- typewriter ---------- */
  function typeInto(el, text, speed, onDone){
    el.textContent = '';
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    var scroller = document.getElementById('scene-letter');
    if (reduceMotion){
      el.textContent = text;
      if (scroller) scroller.scrollTop = scroller.scrollHeight;
      if (onDone) onDone();
      return;
    }
    el.appendChild(cursor);
    var chars = Array.from(text);
    var i = 0;
    var lastScrollHeight = scroller ? scroller.scrollHeight : 0;
    var timer = setInterval(function(){
      if (i >= chars.length){
        clearInterval(timer);
        if (cursor.parentNode) cursor.remove();
        if (onDone) onDone();
        return;
      }
      cursor.insertAdjacentText('beforebegin', chars[i]);
      i++;
      if (scroller && scroller.scrollHeight !== lastScrollHeight){
        lastScrollHeight = scroller.scrollHeight;
        scroller.scrollTo({ top: lastScrollHeight, behavior: 'smooth' });
      }
    }, speed);
  }

  var LETTER_TEXT = "お誕生日おめでとう\n今年はこうしてあなたのお誕生日をお祝いできて、本当に幸せです。\n毎日笑顔で過ごせますように。\n心も体も健康で、たくさんの幸せと素敵な出来事に恵まれる一年になりますように。\nこれから先、きっと嬉しいことばかりじゃなくて、お互いをわかり合えなくなる日もあると思う。\nでも、そんな時でも、変わらず優しく私の手を握っていてくれたら嬉しいな。\nこれからも二人で、一つひとつ思い出を重ねながら、私たちだけの素敵な物語を一緒に紡いでいこうね。\nもっともっと私のことを愛してね🥰\n大好きだよ😘😘😘\nこれからもずっとよろしくね💕";

  var letterTyped = false;
  var letterPhoto = document.getElementById('letter-photo');

  function playLetter(){
    if (letterTyped) return;
    letterTyped = true;
    letterPhoto.classList.add('show');
    typeInto(document.getElementById('letter-text'), LETTER_TEXT, 18);
  }

  /* ---------- envelope open ---------- */
  var envelope = document.getElementById('envelope');
  function openEnvelope(){
    if (envelope.classList.contains('open')) return;
    envelope.classList.add('open');
    setTimeout(function(){
      showScene('letter');
      playLetter();
    }, reduceMotion ? 0 : 650);
  }
  envelope.addEventListener('click', openEnvelope);

  /* ---------- reset ---------- */
  var sceneLetterEl = document.getElementById('scene-letter');
  document.querySelectorAll('[data-reset]').forEach(function(btn){
    btn.addEventListener('click', function(){
      envelope.classList.remove('open');
      showScene('envelope');
      letterTyped = false;
      letterPhoto.classList.remove('show');
      sceneLetterEl.scrollTop = 0;
    });
  });

  /* ---------- falling petals (canvas) ---------- */
  var canvasBg = document.getElementById('petals');
  var ctx2d = null, petals = [], rafId = null;
  function resizeCanvas(){
    canvasBg.width = window.innerWidth * devicePixelRatio;
    canvasBg.height = window.innerHeight * devicePixelRatio;
    canvasBg.style.width = window.innerWidth + 'px';
    canvasBg.style.height = window.innerHeight + 'px';
  }
  function makePetal(){
    return {
      x: Math.random() * window.innerWidth,
      y: Math.random() * -window.innerHeight,
      r: 2 + Math.random() * 3.5,
      speed: 0.25 + Math.random() * 0.5,
      drift: (Math.random() - 0.5) * 0.4,
      hue: Math.random() > 0.5 ? '201,161,90' : '226,118,90',
      alpha: 0.25 + Math.random() * 0.4
    };
  }
  function initPetals(){
    if (canvasBg.getContext) ctx2d = canvasBg.getContext('2d');
    if (!ctx2d) return;
    resizeCanvas();
    var count = Math.min(60, Math.floor(window.innerWidth / 14));
    petals = [];
    for (var i=0;i<count;i++) petals.push(makePetal());
  }
  function drawPetals(){
    if (!ctx2d) return;
    ctx2d.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    ctx2d.clearRect(0,0,window.innerWidth, window.innerHeight);
    petals.forEach(function(p){
      p.y += p.speed;
      p.x += p.drift;
      if (p.y > window.innerHeight + 10){ p.y = -10; p.x = Math.random()*window.innerWidth; }
      ctx2d.beginPath();
      ctx2d.fillStyle = 'rgba(' + p.hue + ',' + p.alpha + ')';
      ctx2d.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx2d.fill();
    });
    rafId = requestAnimationFrame(drawPetals);
  }
  window.addEventListener('resize', resizeCanvas);
  initPetals();
  if (ctx2d){
    drawPetals();
  }
})();
</script>
